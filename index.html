<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Eat the Frog</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Mono:wght@300;400;500&family=DM+Sans:wght@300;400;500&display=swap');
 
  :root {
    --bg: #0e1208;
    --surface: #161c0c;
    --surface2: #1c2510;
    --surface3: #222d13;
    --green-bright: #7cfc00;
    --green-mid: #4a9c1a;
    --amber: #f5a623;
    --red: #e85d5d;
    --blue: #5da8e8;
    --purple: #a78bfa;
    --muted: #4a5c35;
    --text: #d4e8a8;
    --text2: #8aaa60;
    --text3: #526640;
    --border: rgba(124,252,0,0.12);
    --border2: rgba(124,252,0,0.06);
    --A: #e85d5d;
    --B: #f5a623;
    --C: #5da8e8;
    --D: #a78bfa;
    --E: #526640;
  }
 
  * { margin:0; padding:0; box-sizing:border-box; }
 
  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
  }
 
  body::before {
    content:'';
    position:fixed;
    top:-200px; left:50%;
    transform:translateX(-50%);
    width:700px; height:700px;
    background:radial-gradient(circle, rgba(124,252,0,0.03) 0%, transparent 65%);
    pointer-events:none;
    z-index:0;
  }
 
  .app {
    max-width:900px;
    margin:0 auto;
    padding:0 24px 100px;
    position:relative;
    z-index:1;
  }
 
  /* ── Header ── */
  header {
    display:flex;
    align-items:center;
    justify-content:space-between;
    padding:28px 0 20px;
    border-bottom:1px solid var(--border2);
    margin-bottom:32px;
  }
 
  .logo {
    font-family:'Syne', sans-serif;
    font-size:22px;
    font-weight:800;
    color:var(--green-bright);
    letter-spacing:-0.5px;
    display:flex;
    align-items:center;
    gap:10px;
  }
  .logo span { color:var(--text3); font-weight:400; font-size:14px; letter-spacing:0; }
 
  .header-stats { display:flex; gap:24px; align-items:center; }
  .stat { text-align:right; }
  .stat-num { font-family:'DM Mono',monospace; font-size:20px; font-weight:500; color:var(--green-bright); line-height:1; }
  .stat-label { font-size:11px; color:var(--text3); text-transform:uppercase; letter-spacing:0.08em; margin-top:2px; }
 
  /* ── Pond + Speech ── */
  .frog-zone {
    display:flex;
    gap:28px;
    align-items:flex-start;
    margin-bottom:36px;
  }
 
  .frog-container { flex-shrink:0; }
 
  #pond-canvas {
    display:block;
    border-radius:50%;
    cursor:pointer;
    filter:drop-shadow(0 0 20px rgba(124,252,0,0.15));
    transition:filter 0.3s;
  }
  #pond-canvas:hover { filter:drop-shadow(0 0 32px rgba(124,252,0,0.28)); }
 
  .meters { display:flex; gap:12px; margin-top:10px; width:160px; }
  .meter { flex:1; }
  .meter-label {
    font-size:10px; color:var(--text3);
    text-transform:uppercase; letter-spacing:0.1em;
    font-family:'DM Mono',monospace;
    margin-bottom:5px;
    display:flex; justify-content:space-between;
  }
  .meter-bar { height:4px; background:var(--surface3); border-radius:2px; overflow:hidden; }
  .meter-fill { height:100%; border-radius:2px; transition:width 0.6s cubic-bezier(0.34,1.56,0.64,1); }
  .meter-fill.hunger { background:var(--amber); }
  .meter-fill.hydration { background:var(--blue); }
 
  .frog-speech {
    background:var(--surface2);
    border:1px solid var(--border);
    border-radius:16px;
    padding:18px 22px;
    flex:1;
    position:relative;
    min-height:128px;
    display:flex;
    flex-direction:column;
    justify-content:center;
  }
  .frog-speech::before {
    content:'';
    position:absolute;
    left:-9px; top:40px;
    width:0; height:0;
    border-top:9px solid transparent;
    border-bottom:9px solid transparent;
    border-right:9px solid var(--border);
  }
  .frog-speech::after {
    content:'';
    position:absolute;
    left:-8px; top:41px;
    width:0; height:0;
    border-top:8px solid transparent;
    border-bottom:8px solid transparent;
    border-right:8px solid var(--surface2);
  }
  .speech-label {
    font-size:10px; text-transform:uppercase;
    letter-spacing:0.12em; color:var(--green-mid);
    font-family:'DM Mono',monospace; margin-bottom:8px;
  }
  .speech-text { font-size:15px; line-height:1.65; color:var(--text); }
  .speech-text strong { color:var(--green-bright); font-weight:500; }
 
  /* ── Add Task ── */
  .add-section {
    background:var(--surface);
    border:1px solid var(--border);
    border-radius:16px;
    padding:24px;
    margin-bottom:28px;
  }
  .add-section h2 {
    font-family:'Syne',sans-serif; font-size:13px; font-weight:600;
    color:var(--text3); text-transform:uppercase; letter-spacing:0.1em;
    margin-bottom:16px;
  }
  .add-row { display:flex; gap:10px; align-items:flex-end; flex-wrap:wrap; }
 
  .input-group { flex:1; min-width:160px; }
  .input-group label {
    display:block; font-size:11px; color:var(--text3);
    text-transform:uppercase; letter-spacing:0.08em;
    margin-bottom:6px; font-family:'DM Mono',monospace;
  }
 
  input[type="text"], input[type="number"] {
    width:100%;
    background:var(--surface2);
    border:1px solid var(--border);
    border-radius:10px;
    color:var(--text);
    font-family:'DM Sans',sans-serif;
    font-size:14px;
    padding:10px 14px;
    outline:none;
    transition:border-color 0.2s;
    -moz-appearance:textfield;
  }
  input[type="number"]::-webkit-outer-spin-button,
  input[type="number"]::-webkit-inner-spin-button { -webkit-appearance:none; margin:0; }
  input[type="text"]:focus, input[type="number"]:focus { border-color:rgba(124,252,0,0.3); }
  input::placeholder { color:var(--text3); }
 
  .time-wrap { position:relative; width:100px; flex-shrink:0; }
  .time-wrap input { padding-right:34px; }
  .time-wrap span {
    position:absolute; right:12px; top:50%;
    transform:translateY(-50%);
    font-size:11px; color:var(--text3);
    font-family:'DM Mono',monospace;
    pointer-events:none;
  }
 
  .type-select { display:flex; gap:6px; flex-shrink:0; }
  .type-btn {
    width:42px; height:42px;
    border-radius:10px;
    border:1px solid var(--border);
    background:var(--surface2);
    color:var(--text3);
    cursor:pointer;
    font-family:'Syne',sans-serif;
    font-size:15px; font-weight:800;
    transition:all 0.15s;
    display:flex; align-items:center; justify-content:center;
  }
  .type-btn:hover { border-color:rgba(124,252,0,0.25); }
  .type-btn.active[data-type="A"] { background:rgba(232,93,93,0.15); border-color:var(--A); color:var(--A); }
  .type-btn.active[data-type="B"] { background:rgba(245,166,35,0.15); border-color:var(--B); color:var(--B); }
  .type-btn.active[data-type="C"] { background:rgba(93,168,232,0.15); border-color:var(--C); color:var(--C); }
  .type-btn.active[data-type="D"] { background:rgba(167,139,250,0.15); border-color:var(--D); color:var(--D); }
  .type-btn.active[data-type="E"] { background:rgba(82,102,64,0.25); border-color:var(--E); color:var(--text2); }
 
  .add-btn {
    height:42px; padding:0 22px;
    background:var(--green-bright);
    border:none; border-radius:10px;
    color:var(--bg);
    font-family:'Syne',sans-serif;
    font-size:14px; font-weight:700;
    cursor:pointer;
    transition:all 0.15s;
    white-space:nowrap; flex-shrink:0;
  }
  .add-btn:hover { background:#93ff20; transform:translateY(-1px); }
  .add-btn:active { transform:translateY(0) scale(0.98); }
 
  .type-hint {
    font-size:12px; color:var(--text3);
    margin-top:10px; font-family:'DM Mono',monospace; min-height:18px;
  }
 
  /* ── Tasks ── */
  .tasks-header { display:flex; align-items:center; justify-content:space-between; margin-bottom:16px; }
  .tasks-header h2 { font-family:'Syne',sans-serif; font-size:22px; font-weight:700; color:var(--text); }
  .filter-tabs { display:flex; gap:6px; }
  .filter-tab {
    padding:5px 12px; border-radius:8px;
    border:1px solid var(--border);
    background:transparent; color:var(--text3);
    font-size:12px; font-family:'DM Mono',monospace;
    cursor:pointer; transition:all 0.15s;
  }
  .filter-tab:hover, .filter-tab.active {
    background:var(--surface2); color:var(--text);
    border-color:rgba(124,252,0,0.2);
  }
 
  .task-group { margin-bottom:20px; }
  .group-header {
    display:flex; align-items:center; gap:10px;
    margin-bottom:10px; cursor:pointer; user-select:none;
  }
  .group-dot { width:8px; height:8px; border-radius:50%; flex-shrink:0; }
  .group-label { font-family:'Syne',sans-serif; font-size:12px; font-weight:700; text-transform:uppercase; letter-spacing:0.1em; }
  .group-count {
    font-size:11px; font-family:'DM Mono',monospace;
    color:var(--text3); background:var(--surface2);
    padding:2px 7px; border-radius:20px; border:1px solid var(--border2);
  }
  .group-toggle { margin-left:auto; font-size:11px; color:var(--text3); transition:transform 0.2s; }
  .group-toggle.collapsed { transform:rotate(-90deg); }
 
  .task-list { display:flex; flex-direction:column; gap:8px; }
 
  .task-card {
    background:var(--surface);
    border:1px solid var(--border2);
    border-radius:12px;
    padding:14px 16px;
    display:flex; align-items:flex-start; gap:12px;
    transition:all 0.2s;
    position:relative; overflow:hidden;
    animation:slideIn 0.2s ease-out;
  }
  @keyframes slideIn { from{opacity:0;transform:translateY(-8px)} to{opacity:1;transform:translateY(0)} }
 
  .task-card::before {
    content:''; position:absolute;
    left:0; top:0; bottom:0; width:3px;
  }
  .task-card[data-type="A"]::before { background:var(--A); }
  .task-card[data-type="B"]::before { background:var(--B); }
  .task-card[data-type="C"]::before { background:var(--C); }
  .task-card[data-type="D"]::before { background:var(--D); }
  .task-card[data-type="E"]::before { background:var(--E); }
 
  .task-card:hover { border-color:var(--border); background:var(--surface2); }
  .task-card.done { opacity:0.45; }
  .task-card.done .task-title { text-decoration:line-through; color:var(--text3); }
 
  .task-check {
    width:20px; height:20px; border-radius:6px;
    border:1.5px solid var(--muted); background:transparent;
    cursor:pointer; flex-shrink:0; margin-top:1px;
    display:flex; align-items:center; justify-content:center;
    transition:all 0.15s;
    appearance:none; -webkit-appearance:none;
  }
  .task-check:hover { border-color:var(--green-mid); background:rgba(124,252,0,0.06); }
  .task-check:checked { background:var(--green-mid); border-color:var(--green-mid); }
  .task-check:checked::after {
    content:''; display:block;
    width:10px; height:7px;
    border-left:2px solid var(--bg);
    border-bottom:2px solid var(--bg);
    transform:rotate(-45deg) translate(1px,-1px);
  }
 
  .task-body { flex:1; min-width:0; }
  .task-title { font-size:14px; font-weight:400; color:var(--text); line-height:1.4; margin-bottom:5px; word-break:break-word; }
  .task-meta { display:flex; align-items:center; gap:8px; flex-wrap:wrap; }
  .task-badge {
    font-size:10px; font-family:'DM Mono',monospace;
    font-weight:500; padding:2px 8px; border-radius:4px; letter-spacing:0.05em;
  }
  .task-badge[data-type="A"] { background:rgba(232,93,93,0.15); color:var(--A); }
  .task-badge[data-type="B"] { background:rgba(245,166,35,0.15); color:var(--B); }
  .task-badge[data-type="C"] { background:rgba(93,168,232,0.15); color:var(--C); }
  .task-badge[data-type="D"] { background:rgba(167,139,250,0.15); color:var(--D); }
  .task-badge[data-type="E"] { background:rgba(82,102,64,0.25); color:var(--text2); }
  .task-time { font-size:11px; color:var(--text3); font-family:'DM Mono',monospace; }
  .task-dur { font-size:11px; color:var(--text2); font-family:'DM Mono',monospace; display:flex; align-items:center; gap:3px; }
 
  .task-delete {
    background:none; border:none; color:var(--text3);
    cursor:pointer; padding:4px; border-radius:6px;
    transition:all 0.15s; flex-shrink:0;
    font-size:14px; line-height:1; opacity:0;
  }
  .task-card:hover .task-delete { opacity:1; }
  .task-delete:hover { color:var(--red); background:rgba(232,93,93,0.1); }
 
  .empty-state { text-align:center; padding:48px 20px; color:var(--text3); font-size:14px; }
 
  /* Group colors */
  .group-A .group-dot { background:var(--A); } .group-A .group-label { color:var(--A); }
  .group-B .group-dot { background:var(--B); } .group-B .group-label { color:var(--B); }
  .group-C .group-dot { background:var(--C); } .group-C .group-label { color:var(--C); }
  .group-D .group-dot { background:var(--D); } .group-D .group-label { color:var(--D); }
  .group-E .group-dot { background:var(--E); } .group-E .group-label { color:var(--text2); }
 
  /* ── Focus Button ── */
  .focus-btn {
    position:fixed; bottom:28px; right:28px;
    background:var(--green-bright); color:var(--bg);
    border:none; border-radius:14px;
    padding:14px 22px;
    font-family:'Syne',sans-serif; font-size:14px; font-weight:700;
    cursor:pointer;
    box-shadow:0 0 28px rgba(124,252,0,0.28);
    transition:all 0.2s; z-index:100;
    display:flex; align-items:center; gap:8px;
  }
  .focus-btn:hover { transform:translateY(-2px); box-shadow:0 0 42px rgba(124,252,0,0.42); }
 
  /* ── Focus Overlay ── */
  .focus-overlay {
    display:none; position:fixed; inset:0;
    background:rgba(14,18,8,0.97);
    z-index:200;
    flex-direction:column; align-items:center; justify-content:center;
    padding:40px;
  }
  .focus-overlay.active { display:flex; }
 
  .focus-card {
    background:var(--surface);
    border:1px solid var(--border);
    border-radius:24px;
    padding:44px 52px;
    max-width:580px; width:100%;
    text-align:center; position:relative;
  }
 
  .focus-close {
    position:absolute; top:16px; right:16px;
    background:none; border:none; color:var(--text3);
    cursor:pointer; font-size:18px; padding:8px;
    line-height:1; border-radius:8px; transition:all 0.15s;
  }
  .focus-close:hover { color:var(--text); background:var(--surface2); }
 
  .focus-badge {
    font-size:11px; font-family:'DM Mono',monospace;
    text-transform:uppercase; letter-spacing:0.15em; margin-bottom:14px;
  }
  .focus-task {
    font-family:'Syne',sans-serif; font-size:26px; font-weight:700;
    color:var(--text); line-height:1.3; margin-bottom:28px;
  }
 
  /* ── Timer ── */
  .timer-section {
    margin:0 auto 24px;
    display:flex; flex-direction:column; align-items:center; gap:14px;
  }
  .timer-display {
    font-family:'DM Mono',monospace;
    font-size:58px; font-weight:300;
    color:var(--green-bright); letter-spacing:0.04em; line-height:1;
    transition:color 0.3s;
  }
  .timer-display.urgent { color:var(--A); }
 
  .timer-track {
    width:100%; height:3px;
    background:var(--surface3); border-radius:2px; overflow:hidden;
  }
  .timer-fill {
    height:100%; background:var(--green-bright);
    border-radius:2px; transition:width 1s linear, background 0.3s;
  }
  .timer-fill.urgent { background:var(--A); }
 
  .timer-presets { display:flex; gap:6px; align-items:center; flex-wrap:wrap; justify-content:center; }
  .t-preset {
    padding:5px 12px; border-radius:8px;
    border:1px solid var(--border); background:transparent;
    color:var(--text3); font-size:12px; font-family:'DM Mono',monospace;
    cursor:pointer; transition:all 0.15s;
  }
  .t-preset:hover, .t-preset.sel {
    background:var(--surface2); color:var(--text);
    border-color:rgba(124,252,0,0.25);
  }
  .t-custom { display:flex; align-items:center; gap:5px; }
  .t-custom input {
    width:52px; height:28px; padding:4px 8px;
    font-size:12px; font-family:'DM Mono',monospace;
  }
  .t-custom span { font-size:11px; color:var(--text3); font-family:'DM Mono',monospace; }
 
  .timer-btns { display:flex; gap:8px; justify-content:center; }
 
  .btn-playpause {
    width:46px; height:46px; border-radius:50%;
    border:1.5px solid rgba(124,252,0,0.3);
    background:rgba(124,252,0,0.08); color:var(--green-bright);
    cursor:pointer; display:flex; align-items:center; justify-content:center;
    transition:all 0.15s;
  }
  .btn-playpause:hover { background:rgba(124,252,0,0.16); border-color:rgba(124,252,0,0.5); }
 
  .btn-reset {
    width:46px; height:46px; border-radius:50%;
    border:1px solid var(--border); background:transparent; color:var(--text3);
    cursor:pointer; display:flex; align-items:center; justify-content:center;
    transition:all 0.15s;
  }
  .btn-reset:hover { color:var(--text); background:var(--surface2); }
 
  .focus-remaining { font-size:12px; color:var(--text3); font-family:'DM Mono',monospace; margin-bottom:22px; }
 
  .focus-actions { display:flex; gap:12px; justify-content:center; }
  .focus-complete {
    background:var(--green-bright); color:var(--bg);
    border:none; border-radius:12px; padding:13px 26px;
    font-family:'Syne',sans-serif; font-size:14px; font-weight:700;
    cursor:pointer; transition:all 0.15s;
  }
  .focus-complete:hover { background:#93ff20; transform:translateY(-1px); }
  .focus-skip {
    background:var(--surface2); color:var(--text2);
    border:1px solid var(--border); border-radius:12px;
    padding:13px 20px; font-family:'DM Sans',sans-serif;
    font-size:14px; cursor:pointer; transition:all 0.15s;
  }
  .focus-skip:hover { background:var(--surface3); }
 
  /* ── Progress ring ── */
  .progress-ring { transform:rotate(-90deg); }
  .ring-bg { fill:none; stroke:var(--surface3); stroke-width:3; }
  .ring-fill { fill:none; stroke:var(--green-bright); stroke-width:3; stroke-linecap:round; transition:stroke-dashoffset 0.6s; }
 
  /* ── Confetti ── */
  .celebrate { position:fixed; inset:0; pointer-events:none; z-index:300; overflow:hidden; }
  .cp {
    position:absolute; width:7px; height:7px; border-radius:1px;
    animation:conf 1.1s ease-out forwards; opacity:0;
  }
  @keyframes conf {
    0%{transform:translate(0,0) rotate(0deg);opacity:1}
    100%{transform:translate(var(--tx),var(--ty)) rotate(var(--r));opacity:0}
  }
</style>
</head>
<body>
<div class="app">
 
  <header>
    <div class="logo">Eat the Frog <span>— get it done.</span></div>
    <div class="header-stats">
      <div class="stat">
        <div class="stat-num" id="done-count">0</div>
        <div class="stat-label">Done today</div>
      </div>
      <div style="position:relative;width:44px;height:44px;flex-shrink:0">
        <svg width="44" height="44" class="progress-ring">
          <circle class="ring-bg" cx="22" cy="22" r="18"/>
          <circle class="ring-fill" id="prog-ring" cx="22" cy="22" r="18" stroke-dasharray="113" stroke-dashoffset="113"/>
        </svg>
        <div style="position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-family:'DM Mono',monospace;font-size:10px;color:var(--green-bright);font-weight:500" id="prog-pct">0%</div>
      </div>
    </div>
  </header>
 
  <div class="frog-zone">
    <div class="frog-container">
      <canvas id="pond-canvas" width="160" height="160" title="Click for a briefing"></canvas>
      <div class="meters">
        <div class="meter">
          <div class="meter-label"><span>Hunger</span><span id="hunger-val">80</span></div>
          <div class="meter-bar"><div class="meter-fill hunger" id="hunger-bar" style="width:80%"></div></div>
        </div>
        <div class="meter">
          <div class="meter-label"><span>Water</span><span id="hydration-val">70</span></div>
          <div class="meter-bar"><div class="meter-fill hydration" id="hydration-bar" style="width:70%"></div></div>
        </div>
      </div>
    </div>
 
    <div style="flex:1">
      <div class="frog-speech">
        <div class="speech-label">Ribbit Report</div>
        <div class="speech-text" id="frog-msg">
          Click the frog for a task briefing. Add something important and <strong>it will tell you what needs eating first.</strong>
        </div>
      </div>
    </div>
  </div>
 
  <!-- Add task -->
  <div class="add-section">
    <h2>Add a Task</h2>
    <div class="add-row">
      <div class="input-group">
        <label>Task</label>
        <input type="text" id="task-input" placeholder="What needs doing?" autocomplete="off"/>
      </div>
      <div class="input-group" style="max-width:110px;flex:none;">
        <label>Est. time</label>
        <div class="time-wrap">
          <input type="number" id="time-input" placeholder="25" min="1" max="480"/>
          <span>min</span>
        </div>
      </div>
      <div>
        <div style="font-size:11px;color:var(--text3);text-transform:uppercase;letter-spacing:0.08em;font-family:'DM Mono',monospace;margin-bottom:6px">Priority</div>
        <div class="type-select">
          <button class="type-btn active" data-type="A">A</button>
          <button class="type-btn" data-type="B">B</button>
          <button class="type-btn" data-type="C">C</button>
          <button class="type-btn" data-type="D">D</button>
          <button class="type-btn" data-type="E">E</button>
        </div>
      </div>
      <button class="add-btn" onclick="addTask()">Add Task</button>
    </div>
    <div class="type-hint" id="type-hint">A — Must do: serious consequences if skipped. Eat this frog first.</div>
  </div>
 
  <!-- Task list -->
  <div class="tasks-header">
    <h2>Your Frogs</h2>
    <div class="filter-tabs">
      <button class="filter-tab active" onclick="setFilter(this,'all')">All</button>
      <button class="filter-tab" onclick="setFilter(this,'pending')">Pending</button>
      <button class="filter-tab" onclick="setFilter(this,'done')">Done</button>
    </div>
  </div>
  <div id="task-container"></div>
</div>
 
<button class="focus-btn" onclick="openFocus()">
  <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
    <circle cx="8" cy="8" r="3" fill="currentColor"/>
    <circle cx="8" cy="8" r="6.5" stroke="currentColor" stroke-width="1.3"/>
  </svg>
  Focus Mode
</button>
 
<div class="focus-overlay" id="focus-overlay">
  <div class="focus-card">
    <button class="focus-close" onclick="closeFocus()">&#x2715;</button>
    <div id="focus-content"></div>
  </div>
</div>
 
<div class="celebrate" id="celebrate"></div>
 
<script>
/* ═══════════════════════════════════════════════
   POND + FROG CANVAS
═══════════════════════════════════════════════ */
const canvas = document.getElementById('pond-canvas');
const ctx = canvas.getContext('2d');
const W = 160, H = 160;
let tick = 0;
 
// Frog physics
let fx = W/2, fy = H/2 + 8;
let tx = fx, ty = fy;
let swimming = false, swimTimer = 0, swimDur = 0;
let legPhase = 0, bobPhase = 0;
let blinkVal = 0, blinkClock = 140 + Math.random()*160;
let tongueVal = 0;
 
// Ripple pool
const ripples = [];
 
function spawnRipple(x, y) {
  ripples.push({ x, y, r: 2, maxR: 22 + Math.random()*10, a: 0.5, speed: 0.5 + Math.random()*0.3 });
}
 
function pickTarget() {
  const m = 32;
  tx = m + Math.random()*(W - m*2);
  ty = m + Math.random()*(H - m*2);
  swimming = true;
  swimDur = 70 + Math.random()*80;
  swimTimer = 0;
  spawnRipple(fx, fy);
}
 
// Lily pad data (fixed positions)
const lilies = [
  { x:26, y:36, r:15, phase:0, speed:0.004 },
  { x:132, y:130, r:13, phase:1.2, speed:0.005 },
  { x:38, y:126, r:11, phase:2.4, speed:0.006 },
  { x:128, y:38, r:10, phase:0.8, speed:0.0045 }
];
 
function drawWater() {
  ctx.save();
  // Clip to circle
  ctx.beginPath();
  ctx.arc(W/2, H/2, W/2-1, 0, Math.PI*2);
  ctx.clip();
 
  // Base water
  const grd = ctx.createRadialGradient(W/2, H/2-15, 8, W/2, H/2, W/2);
  grd.addColorStop(0, '#193826');
  grd.addColorStop(0.55, '#0f2318');
  grd.addColorStop(1, '#07130c');
  ctx.fillStyle = grd;
  ctx.fillRect(0, 0, W, H);
 
  // Shimmer lines
  for (let i = 0; i < 6; i++) {
    const sy = 24 + i*24 + Math.sin(tick*0.016 + i*1.4)*6;
    const sx = 14 + i*5 + Math.cos(tick*0.011 + i*0.9)*10;
    ctx.beginPath();
    ctx.moveTo(sx, sy);
    ctx.bezierCurveTo(sx+14, sy-2, sx+28, sy+2, sx+44, sy);
    ctx.strokeStyle = `rgba(124,252,0,${0.06 + Math.sin(tick*0.02+i)*0.03})`;
    ctx.lineWidth = 1;
    ctx.stroke();
  }
 
  // Ripples
  for (let i = ripples.length-1; i >= 0; i--) {
    const rp = ripples[i];
    rp.r += rp.speed;
    rp.a *= 0.96;
    if (rp.r >= rp.maxR || rp.a < 0.02) { ripples.splice(i, 1); continue; }
    ctx.beginPath();
    ctx.arc(rp.x, rp.y, rp.r, 0, Math.PI*2);
    ctx.strokeStyle = `rgba(124,252,0,${rp.a})`;
    ctx.lineWidth = 0.8;
    ctx.stroke();
    // second ring
    if (rp.r > 6) {
      ctx.beginPath();
      ctx.arc(rp.x, rp.y, rp.r*0.55, 0, Math.PI*2);
      ctx.strokeStyle = `rgba(124,252,0,${rp.a*0.5})`;
      ctx.lineWidth = 0.5;
      ctx.stroke();
    }
  }
 
  // Lily pads
  lilies.forEach(lp => {
    lp.phase += lp.speed;
    ctx.save();
    ctx.translate(lp.x, lp.y);
    ctx.rotate(lp.phase);
    // pad
    ctx.beginPath();
    ctx.moveTo(0,0);
    ctx.arc(0, 0, lp.r, 0.35, Math.PI*2-0.35);
    ctx.closePath();
    ctx.fillStyle = '#1b5222';
    ctx.fill();
    ctx.strokeStyle = '#266b2c';
    ctx.lineWidth = 0.7;
    ctx.stroke();
    // vein lines
    ctx.globalAlpha = 0.4;
    for (let v = 0; v < 4; v++) {
      const vAngle = (v / 4)*Math.PI*2;
      ctx.beginPath();
      ctx.moveTo(0,0);
      ctx.lineTo(Math.cos(vAngle)*lp.r*0.85, Math.sin(vAngle)*lp.r*0.85);
      ctx.strokeStyle = '#3a8040';
      ctx.lineWidth = 0.5;
      ctx.stroke();
    }
    ctx.globalAlpha = 1;
    ctx.restore();
  });
 
  ctx.restore();
 
  // Pond rim
  ctx.beginPath();
  ctx.arc(W/2, H/2, W/2-1.5, 0, Math.PI*2);
  ctx.strokeStyle = 'rgba(40,90,40,0.65)';
  ctx.lineWidth = 3;
  ctx.stroke();
  ctx.beginPath();
  ctx.arc(W/2, H/2, W/2-0.5, 0, Math.PI*2);
  ctx.strokeStyle = 'rgba(124,252,0,0.07)';
  ctx.lineWidth = 1.5;
  ctx.stroke();
}
 
function drawFrog() {
  const by = fy + Math.sin(bobPhase)*2.8;
  const moveAngle = swimming ? Math.atan2(ty-fy, tx-fx) : 0;
  const s = 0.68;
 
  ctx.save();
  ctx.translate(fx, by);
  if (swimming) ctx.rotate(moveAngle - Math.PI/2);
  ctx.scale(s, s);
 
  // Water shadow
  ctx.save();
  ctx.scale(1, 0.3);
  ctx.beginPath();
  ctx.ellipse(0, 72, 34, 12, 0, 0, Math.PI*2);
  ctx.fillStyle = 'rgba(0,0,0,0.3)';
  ctx.fill();
  ctx.restore();
 
  const kick = swimming ? Math.sin(legPhase)*0.55 : 0;
 
  // Back legs (kick when swimming)
  [-1,1].forEach((side, i) => {
    const k = i === 0 ? kick : -kick;
    ctx.save();
    ctx.rotate(k * 0.4);
    ctx.beginPath();
    ctx.ellipse(side*26, 42, 19, 9, side*0.35, 0, Math.PI*2);
    ctx.fillStyle = '#2a5c14';
    ctx.fill();
    ctx.beginPath();
    ctx.ellipse(side*40, 52, 13, 6, side*0.5, 0, Math.PI*2);
    ctx.fillStyle = '#1d4010';
    ctx.fill();
    ctx.restore();
  });
 
  // Body
  ctx.beginPath();
  ctx.ellipse(0, 22, 38, 32, 0, 0, Math.PI*2);
  ctx.fillStyle = '#3a7c1a';
  ctx.fill();
 
  // Body highlight
  ctx.beginPath();
  ctx.ellipse(-5, 10, 18, 12, -0.18, 0, Math.PI*2);
  ctx.fillStyle = 'rgba(72,150,34,0.5)';
  ctx.fill();
 
  // Belly
  ctx.beginPath();
  ctx.ellipse(0, 28, 22, 18, 0, 0, Math.PI*2);
  ctx.fillStyle = 'rgba(200,232,120,0.48)';
  ctx.fill();
 
  // Front arms
  [-1,1].forEach(side => {
    ctx.beginPath();
    ctx.ellipse(side*34, 30, 10, 7, side*0.35, 0, Math.PI*2);
    ctx.fillStyle = '#3a7c1a';
    ctx.fill();
  });
 
  // Head
  ctx.beginPath();
  ctx.ellipse(0, -12, 33, 26, 0, 0, Math.PI*2);
  ctx.fillStyle = '#3a7c1a';
  ctx.fill();
  ctx.beginPath();
  ctx.ellipse(-4, -19, 16, 10, -0.1, 0, Math.PI*2);
  ctx.fillStyle = 'rgba(72,150,34,0.42)';
  ctx.fill();
 
  // Eyes
  const eyePositions = [[-17,-27],[17,-27]];
  const blinkSY = blinkVal > 0 ? Math.max(0.06, 1 - blinkVal*3.5) : 1;
 
  eyePositions.forEach(([ex, ey]) => {
    // socket
    ctx.beginPath();
    ctx.arc(ex, ey, 12, 0, Math.PI*2);
    ctx.fillStyle = '#29580f';
    ctx.fill();
    // eyeball with blink
    ctx.save();
    ctx.translate(ex, ey);
    ctx.scale(1, blinkSY);
    ctx.beginPath();
    ctx.arc(0, 0, 9, 0, Math.PI*2);
    ctx.fillStyle = '#f0f0de';
    ctx.fill();
    ctx.beginPath();
    ctx.arc(2, 1, 6, 0, Math.PI*2);
    ctx.fillStyle = '#181408';
    ctx.fill();
    // iris glow
    ctx.beginPath();
    ctx.arc(3.5, -0.5, 2.5, 0, Math.PI*2);
    ctx.fillStyle = 'rgba(124,252,0,0.72)';
    ctx.fill();
    // specular
    ctx.beginPath();
    ctx.arc(-1, -2, 1.3, 0, Math.PI*2);
    ctx.fillStyle = 'rgba(255,255,255,0.9)';
    ctx.fill();
    ctx.restore();
  });
 
  // Nostrils
  [-5, 5].forEach(nx => {
    ctx.beginPath();
    ctx.arc(nx, -4, 2, 0, Math.PI*2);
    ctx.fillStyle = '#1c3f0e';
    ctx.fill();
  });
 
  // Mouth — varies slightly when tongue out
  ctx.beginPath();
  ctx.moveTo(-18, 4);
  ctx.quadraticCurveTo(0, 14 + tongueVal*4, 18, 4);
  ctx.strokeStyle = '#1c3f0e';
  ctx.lineWidth = 2;
  ctx.stroke();
 
  // Tongue
  if (tongueVal > 0) {
    const tp = Math.sin(tongueVal * Math.PI);
    ctx.save();
    ctx.translate(0, 4);
    ctx.scale(tp, tp);
    ctx.beginPath();
    ctx.ellipse(0, 15, 13, 6, 0, 0, Math.PI*2);
    ctx.fillStyle = '#d9508a';
    ctx.fill();
    // fork
    ctx.beginPath();
    ctx.arc(-6, 20, 4, 0, Math.PI*2);
    ctx.fillStyle = '#d9508a';
    ctx.fill();
    ctx.beginPath();
    ctx.arc(6, 20, 4, 0, Math.PI*2);
    ctx.fillStyle = '#d9508a';
    ctx.fill();
    ctx.restore();
  }
 
  ctx.restore();
}
 
function updateFrogState() {
  tick++;
  bobPhase += 0.04;
  if (tongueVal > 0) tongueVal -= 0.033;
  if (tongueVal < 0) tongueVal = 0;
 
  // Blink
  blinkClock--;
  if (blinkClock <= 0) {
    blinkVal = 0.3;
    blinkClock = 120 + Math.random()*180;
  }
  if (blinkVal > 0) { blinkVal -= 0.045; if (blinkVal < 0) blinkVal = 0; }
 
  // Swimming
  if (!swimming) {
    if (Math.random() < 0.004) pickTarget();
  } else {
    legPhase += 0.2;
    swimTimer++;
    const dx = tx - fx, dy = ty - fy;
    const dist = Math.sqrt(dx*dx + dy*dy);
    if (dist < 2.5 || swimTimer > swimDur) {
      swimming = false; legPhase = 0;
      spawnRipple(fx, fy);
      // occasional random ripples near frog
      setTimeout(() => spawnRipple(fx + (Math.random()-0.5)*20, fy + (Math.random()-0.5)*20), 300);
    } else {
      const spd = 0.85;
      fx += (dx/dist)*spd;
      fy += (dy/dist)*spd;
    }
  }
 
  // Passive ripple now and then
  if (tick % 180 === 0) spawnRipple(fx + (Math.random()-0.5)*30, fy + (Math.random()-0.5)*30);
 
  fx = Math.max(34, Math.min(W-34, fx));
  fy = Math.max(34, Math.min(H-34, fy));
}
 
function renderPond() {
  ctx.clearRect(0, 0, W, H);
  updateFrogState();
  drawWater();
  drawFrog();
  requestAnimationFrame(renderPond);
}
 
renderPond();
 
canvas.addEventListener('click', () => {
  tongueVal = 1;
  spawnRipple(fx, fy);
  frogSpeak();
});
 
/* ═══════════════════════════════════════════════
   APP LOGIC
═══════════════════════════════════════════════ */
const TYPES = {
  A:{label:'A – Must Do',   hint:'A — Must do: serious consequences if skipped. Eat this frog first.', color:'#e85d5d', desc:'Critical frog'},
  B:{label:'B – Should Do', hint:'B — Should do: mild consequences if skipped.',                       color:'#f5a623', desc:'Important task'},
  C:{label:'C – Nice To Do',hint:'C — Nice to do: no real consequences if skipped.',                   color:'#5da8e8', desc:'Low priority'},
  D:{label:'D – Delegate',  hint:'D — Delegate: someone else can handle this.',                        color:'#a78bfa', desc:'Hand it off'},
  E:{label:'E – Eliminate', hint:'E — Eliminate: cut it. Not worth your time.',                        color:'#526640', desc:'Cut it'}
};
 
const MSGS = {
  empty: [
    "The lily pad is bare. Add some tasks — let us see what frogs need eating today.",
    "Nothing to croak about yet. Add your tasks and I will sort the frogs from the flies.",
    "An empty pond. Drop your to-dos in and I will tell you what to eat first."
  ],
  hasA: (n, text, mins) => {
    const t = mins ? ` (~${mins} min)` : '';
    return [
      `You have <strong>${n} critical frog${n>1?'s':''}</strong> waiting. Biggest right now: <strong>"${text}"</strong>${t} — eat it first.`,
      `Do not touch your B or C tasks yet. <strong>"${text}"</strong>${t} is staring you down. Start there.`,
      `<strong>${n} A-priority frog${n>1?'s':''}</strong> on the plate. Lead with <strong>"${text}"</strong>${t}. Everything else can wait.`
    ];
  },
  onlyBC: (text, mins) => {
    const t = mins ? ` (~${mins} min)` : '';
    return [
      `No critical tasks right now. Your top frog is <strong>"${text}"</strong>${t}. Get it done while you are fresh.`,
      `The pond is manageable. Lead with <strong>"${text}"</strong>${t}, then work down the list.`
    ];
  },
  allDone: [
    "All frogs eaten. The pond is clear. Take a breath — you did the work.",
    "Clean slate. Every frog devoured. That is what focus looks like.",
    "Nothing left to croak about. You crushed it. The pond refills tomorrow."
  ],
  delegateOnly: [
    "Check your D tasks — some of these could be handed off. Delegation is not laziness, it is leverage.",
    "Do not do everything yourself. Those D tasks? Pass them along and focus on what only you can do."
  ]
};
 
let tasks = JSON.parse(localStorage.getItem('etf_tasks') || '[]');
let selType = 'A';
let filter = 'all';
let hunger = 80, hydration = 70;
let focusIdx = 0;
 
// Timer state
let tmrTotal = 0, tmrLeft = 0, tmrRunning = false, tmrIv = null;
 
function save() { localStorage.setItem('etf_tasks', JSON.stringify(tasks)); }
 
/* ── Type selector ── */
function selTypeBtn(type) {
  selType = type;
  document.querySelectorAll('.type-btn').forEach(b => b.classList.toggle('active', b.dataset.type===type));
  document.getElementById('type-hint').textContent = TYPES[type].hint;
}
document.querySelectorAll('.type-btn').forEach(b => b.onclick=()=>selTypeBtn(b.dataset.type));
document.getElementById('task-input').addEventListener('keydown', e=>{ if(e.key==='Enter') addTask(); });
 
/* ── Add task ── */
function addTask() {
  const inp = document.getElementById('task-input');
  const tInp = document.getElementById('time-input');
  const text = inp.value.trim();
  if (!text) { inp.focus(); return; }
  const mins = parseInt(tInp.value)||null;
  tasks.push({ id:Date.now(), text, type:selType, done:false, mins,
    created: new Date().toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'}) });
  save();
  inp.value=''; tInp.value=''; inp.focus();
  hunger = Math.min(100, hunger+8);
  hydration = Math.min(100, hydration+5);
  updateMeters(); render();
  tongueVal = 1;
  setTimeout(frogSpeak, 600);
}
 
/* ── Toggle done ── */
function toggleDone(id) {
  const t = tasks.find(t=>t.id===id);
  if (!t) return;
  t.done = !t.done; save();
  if (t.done && t.type==='A') {
    celebrate();
    hunger = Math.max(0, hunger-20);
    hydration = Math.max(0, hydration-15);
  }
  updateMeters(); render(); updateStats();
  setTimeout(frogSpeak, 400);
}
 
function deleteTask(id) {
  tasks = tasks.filter(t=>t.id!==id); save(); render(); updateStats();
}
 
/* ── Filter ── */
function setFilter(el, f) {
  filter = f;
  document.querySelectorAll('.filter-tab').forEach(b=>b.classList.toggle('active',b===el));
  render();
}
 
function visible() {
  if (filter==='pending') return tasks.filter(t=>!t.done);
  if (filter==='done') return tasks.filter(t=>t.done);
  return tasks;
}
 
/* ── Render ── */
function render() {
  const c = document.getElementById('task-container');
  const vt = visible();
  if (!vt.length) { c.innerHTML='<div class="empty-state">No tasks here yet.</div>'; updateStats(); return; }
  const g = {A:[],B:[],C:[],D:[],E:[]};
  vt.forEach(t=>g[t.type].push(t));
  let html='';
  Object.entries(g).forEach(([type,list])=>{
    if (!list.length) return;
    html+=`<div class="task-group group-${type}">
      <div class="group-header" onclick="toggleGrp('${type}')">
        <div class="group-dot"></div>
        <div class="group-label">${TYPES[type].label}</div>
        <div class="group-count">${list.length}</div>
        <div class="group-toggle" id="gt-${type}">&#9662;</div>
      </div>
      <div class="task-list" id="gl-${type}">${list.map(cardHTML).join('')}</div>
    </div>`;
  });
  c.innerHTML=html; updateStats();
}
 
function cardHTML(t) {
  const dur = t.mins ? `<span class="task-dur">
    <svg width="10" height="10" viewBox="0 0 10 10" fill="none">
      <circle cx="5" cy="5" r="4" stroke="currentColor" stroke-width="1"/>
      <path d="M5 3v2l1.5 1.5" stroke="currentColor" stroke-width="1" stroke-linecap="round"/>
    </svg>${t.mins}m</span>` : '';
  return `<div class="task-card${t.done?' done':''}" data-type="${t.type}">
    <input type="checkbox" class="task-check"${t.done?' checked':''} onchange="toggleDone(${t.id})"/>
    <div class="task-body">
      <div class="task-title">${esc(t.text)}</div>
      <div class="task-meta">
        <span class="task-badge" data-type="${t.type}">${t.type}</span>
        ${dur}
        <span class="task-time">${t.created}</span>
      </div>
    </div>
    <button class="task-delete" onclick="deleteTask(${t.id})">&#x2715;</button>
  </div>`;
}
 
function esc(s) { return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
 
function toggleGrp(type) {
  const l=document.getElementById('gl-'+type), g=document.getElementById('gt-'+type);
  if (!l) return;
  l.style.display = l.style.display==='none' ? '' : 'none';
  g.classList.toggle('collapsed', l.style.display==='none');
}
 
/* ── Stats ── */
function updateStats() {
  const done=tasks.filter(t=>t.done).length, total=tasks.length;
  document.getElementById('done-count').textContent=done;
  const pct=total?Math.round((done/total)*100):0;
  document.getElementById('prog-pct').textContent=pct+'%';
  const circ=2*Math.PI*18;
  document.getElementById('prog-ring').style.strokeDashoffset=circ-(pct/100)*circ;
}
 
function updateMeters() {
  document.getElementById('hunger-bar').style.width=hunger+'%';
  document.getElementById('hunger-val').textContent=Math.round(hunger);
  document.getElementById('hydration-bar').style.width=hydration+'%';
  document.getElementById('hydration-val').textContent=Math.round(hydration);
}
 
/* ── Frog speech ── */
function frogSpeak() {
  const el=document.getElementById('frog-msg');
  const pending=tasks.filter(t=>!t.done);
  const pA=pending.filter(t=>t.type==='A');
  const pB=pending.filter(t=>t.type==='B');
  const pD=pending.filter(t=>t.type==='D');
  let msgs;
  if (!tasks.length) msgs=MSGS.empty;
  else if (tasks.every(t=>t.done)) msgs=MSGS.allDone;
  else if (pA.length) msgs=MSGS.hasA(pA.length, pA[0].text, pA[0].mins);
  else if (pending.length) {
    if (pD.length && !pB.length) msgs=MSGS.delegateOnly;
    else { const top=pB[0]||pending[0]; msgs=MSGS.onlyBC(top.text, top.mins); }
  } else msgs=MSGS.allDone;
  const text=msgs[Math.floor(Math.random()*msgs.length)];
  el.style.cssText='opacity:0;transform:translateY(4px);transition:opacity 0.2s,transform 0.2s';
  setTimeout(()=>{ el.innerHTML=text; el.style.cssText='opacity:1;transform:translateY(0);transition:opacity 0.2s,transform 0.2s'; },200);
}
 
/* ── Celebrate ── */
function celebrate() {
  const el=document.getElementById('celebrate'); el.innerHTML='';
  const cols=['#7cfc00','#f5a623','#e85d5d','#5da8e8','#a78bfa','#c8e87c'];
  for (let i=0;i<38;i++) {
    const p=document.createElement('div'); p.className='cp';
    const x=Math.random()*window.innerWidth, y=Math.random()*window.innerHeight*0.6+60;
    const tx=(Math.random()-0.5)*260+'px', ty=(Math.random()*220+80)+'px';
    p.style.cssText=`left:${x}px;top:${y}px;background:${cols[i%cols.length]};--tx:${tx};--ty:${ty};--r:${Math.random()*720}deg;animation-delay:${Math.random()*0.22}s`;
    el.appendChild(p);
  }
  setTimeout(()=>el.innerHTML='',1600);
}
 
/* ═══════════════════════════════════════════════
   TIMER
═══════════════════════════════════════════════ */
function fmt(s) {
  return `${String(Math.floor(s/60)).padStart(2,'0')}:${String(s%60).padStart(2,'0')}`;
}
 
function setTimer(mins) {
  clearTmr(); tmrRunning=false;
  tmrTotal=mins*60; tmrLeft=tmrTotal;
  updTmrDisplay(); updPlayBtn();
  document.querySelectorAll('.t-preset').forEach(b=>b.classList.toggle('sel',parseInt(b.dataset.m)===mins));
}
 
function toggleTimer() { tmrRunning ? pauseTmr() : startTmr(); }
 
function startTmr() {
  if (tmrLeft<=0) return;
  tmrRunning=true; updPlayBtn();
  tmrIv=setInterval(()=>{ tmrLeft--; updTmrDisplay(); if(tmrLeft<=0){clearTmr();tmrRunning=false;updPlayBtn();flashTimer();}},1000);
}
 
function pauseTmr() { tmrRunning=false; clearTmr(); updPlayBtn(); }
 
function resetTmr() { clearTmr(); tmrRunning=false; tmrLeft=tmrTotal; updTmrDisplay(); updPlayBtn(); }
 
function clearTmr() { if(tmrIv){clearInterval(tmrIv);tmrIv=null;} }
 
function updTmrDisplay() {
  const d=document.getElementById('tmr-disp'), b=document.getElementById('tmr-bar');
  if(!d) return;
  d.textContent=fmt(tmrLeft);
  const pct=tmrTotal>0?(tmrLeft/tmrTotal)*100:100;
  if(b) b.style.width=pct+'%';
  const urg=tmrLeft>0&&tmrLeft<=60;
  d.classList.toggle('urgent',urg);
  if(b) b.classList.toggle('urgent',urg);
}
 
function updPlayBtn() {
  const btn=document.getElementById('play-btn');
  if(!btn) return;
  btn.innerHTML=tmrRunning
    ? `<svg width="13" height="13" viewBox="0 0 13 13" fill="currentColor"><rect x="1.5" y="1.5" width="3.5" height="10" rx="1"/><rect x="8" y="1.5" width="3.5" height="10" rx="1"/></svg>`
    : `<svg width="13" height="13" viewBox="0 0 13 13" fill="currentColor"><path d="M2.5 1.5l9 5-9 5V1.5z"/></svg>`;
}
 
function flashTimer() {
  const d=document.getElementById('tmr-disp'); if(!d) return;
  let n=0;
  const iv=setInterval(()=>{ d.style.opacity=d.style.opacity==='0.15'?'1':'0.15'; if(++n>8){clearInterval(iv);d.style.opacity='1';} },200);
}
 
function applyCustom() {
  const inp=document.getElementById('custom-min');
  const v=parseInt(inp.value);
  if(v>0&&v<=480){
    document.querySelectorAll('.t-preset').forEach(b=>b.classList.remove('sel'));
    setTimer(v);
  }
}
 
/* ═══════════════════════════════════════════════
   FOCUS MODE
═══════════════════════════════════════════════ */
function openFocus() {
  const frogs=tasks.filter(t=>!t.done).sort((a,b)=>'ABCDE'.indexOf(a.type)-'ABCDE'.indexOf(b.type));
  const content=document.getElementById('focus-content');
  clearTmr(); tmrRunning=false;
 
  if (!frogs.length) {
    content.innerHTML=`
      <div style="font-size:11px;font-family:'DM Mono',monospace;color:var(--green-bright);letter-spacing:0.12em;text-transform:uppercase;margin-bottom:14px">All done</div>
      <div style="font-family:'Syne',sans-serif;font-size:22px;font-weight:700;color:var(--text);margin-bottom:10px">Every frog has been eaten.</div>
      <div style="font-size:13px;color:var(--text3);font-family:'DM Mono',monospace;margin-bottom:28px">The pond is clear. Well done.</div>
      <button class="focus-skip" onclick="closeFocus()">Close</button>`;
    document.getElementById('focus-overlay').classList.add('active');
    return;
  }
 
  const task=frogs[focusIdx%frogs.length];
  const defaultMins=task.mins||25;
  tmrTotal=defaultMins*60; tmrLeft=tmrTotal;
 
  // Build preset buttons — always show 25 and task time, plus 45, 60
  const presets=[...new Set([defaultMins,25,45,60])].sort((a,b)=>a-b);
 
  content.innerHTML=`
    <div class="focus-badge" style="color:${TYPES[task.type].color}">${TYPES[task.type].label} — ${TYPES[task.type].desc}</div>
    <div class="focus-task">${esc(task.text)}</div>
 
    <div class="timer-section">
      <div class="timer-display" id="tmr-disp">${fmt(tmrLeft)}</div>
      <div class="timer-track"><div class="timer-fill" id="tmr-bar" style="width:100%"></div></div>
 
      <div class="timer-presets">
        ${presets.map(m=>`<button class="t-preset${m===defaultMins?' sel':''}" data-m="${m}" onclick="setTimer(${m})">${m}m</button>`).join('')}
        <div class="t-custom">
          <input type="number" id="custom-min" placeholder="—" min="1" max="480"
            onchange="applyCustom()" onkeydown="if(event.key==='Enter')applyCustom()"/>
          <span>min</span>
        </div>
      </div>
 
      <div class="timer-btns">
        <button class="btn-playpause" id="play-btn" onclick="toggleTimer()">
          <svg width="13" height="13" viewBox="0 0 13 13" fill="currentColor"><path d="M2.5 1.5l9 5-9 5V1.5z"/></svg>
        </button>
        <button class="btn-reset" onclick="resetTmr()" title="Reset">
          <svg width="14" height="14" viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round">
            <path d="M2 7a5 5 0 1 0 1-3M2 1v3h3"/>
          </svg>
        </button>
      </div>
    </div>
 
    <div class="focus-remaining">${frogs.length} task${frogs.length>1?'s':''} remaining</div>
    <div class="focus-actions">
      <button class="focus-complete" onclick="completeFocus(${task.id})">Mark done</button>
      ${frogs.length>1?`<button class="focus-skip" onclick="nextFocus()">Next</button>`:''}
    </div>`;
 
  document.getElementById('focus-overlay').classList.add('active');
}
 
function completeFocus(id) {
  clearTmr(); tmrRunning=false;
  const t=tasks.find(t=>t.id===id);
  if(t){ t.done=true; save(); }
  celebrate(); render(); updateStats();
  if(t?.type==='A'){ hunger=Math.max(0,hunger-20); hydration=Math.max(0,hydration-15); updateMeters(); }
  setTimeout(frogSpeak,500);
  closeFocus();
}
 
function nextFocus() { clearTmr(); tmrRunning=false; focusIdx++; openFocus(); }
 
function closeFocus() {
  clearTmr(); tmrRunning=false;
  document.getElementById('focus-overlay').classList.remove('active');
}
 
/* ── Passive meter drain ── */
setInterval(()=>{
  if (tasks.filter(t=>!t.done&&t.type==='A').length>0) {
    hunger=Math.max(10,hunger-0.28);
    hydration=Math.max(10,hydration-0.18);
    updateMeters();
  }
},3000);
 
/* ── Init ── */
render();
frogSpeak();
</script>
</body>
</html>
